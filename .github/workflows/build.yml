name: Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: music-auto-show-linux
            binary: target/release/music-auto-show
          - os: windows-latest
            artifact_name: music-auto-show-windows.exe
            binary: target/release/music-auto-show.exe
          - os: macos-latest
            artifact_name: music-auto-show-macos
            binary: target/release/music-auto-show

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install root tools
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        run: bun install --cwd frontend --frozen-lockfile

      - name: Validate protobuf, frontend, and Rust
        run: bun run check

      - name: Build release binary
        run: cargo build --release --locked

      - name: Rename release binary
        shell: bash
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/music-auto-show-linux/music-auto-show-linux
            artifacts/music-auto-show-windows.exe/music-auto-show-windows.exe
            artifacts/music-auto-show-macos/music-auto-show-macos
          generate_release_notes: true
